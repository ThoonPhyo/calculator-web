<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Calculator</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="./images/calculator.png" type="image/x-icon">

    <!--link with bootstrap  -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- style css -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div
      class="modal modal-sheet position-static d-block p-4 py-md-5"
      tabindex="-1"
      role="dialog"
      id="modalSignin"
    >
      <!-- color mode -->
      <div class="position-absolute top-0 end-0 p-3" style="z-index: 100">
        <button
          id="colorModeToggle"
          class="btn btn-sm bg-success-subtle border border-success-subtle text-success-emphasis rounded-pill"
          aria-label="Toggle color mode"
        >
          ☀️ light
        </button>
      </div>

      <!-- card -->
      <div class="modal-dialog">
        <div class="modal-content rounded-4 shadow">
          <div
            class="modal-header p-5 pb-4 justify-content-center border-bottom-0"
          >
            <h1 class="fw-bold mb-0 text-white">Basic Calculator</h1>
          </div>
          <div class="modal-body p-5 pt-0">
            <form class="">
              <!-- first number -->
              <label class="mb-2 text-white">Number1</label>
              <div class="form-floating mb-3">
                <input
                  type="number"
                  class="form-control rounded-3"
                  id="num1"
                  placeholder="Enter a number"
                />
              </div>

              <!-- second number -->
              <label class="mb-2 text-white">Number2</label>
              <div class="form-floating mb-3">
                <input
                  type="number"
                  class="form-control rounded-3"
                  id="num2"
                  placeholder="Enter another number"
                />
              </div>

              <!-- operation selection & result display -->
              <div class="row mb-4">
                <div class="col-6">
                  <label for="operators" class="form-label text-white"
                    >Operation</label
                  >
                  <select class="form-select" id="operators" required="">
                    <option value="+">+</option>
                    <option value="-">-</option>
                    <option value="*">*</option>
                    <option value="/">/</option>
                  </select>
                </div>
                <div class="col-6">
                  <label class="mb-2 text-white">Result</label>
                  <input
                    type="text"
                    class="form-control"
                    id="result"
                    placeholder="Result will appear here"
                    value
                    disabled
                  />
                </div>
              </div>

              <!-- calculate button -->
              <button
                class="w-100 mb-2 btn btn-lg rounded-3 btn-primary"
                id="calculatebtn"
                type="button"
                onclick="calculate()"
              >
                Calculate
              </button>

              <!-- reset button  -->
              <button
                class="w-100 btn btn-lg rounded-3"
                id="resetBtn"
                type="button"
                onclick="resetCalculator()"
              >
                Reset
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <!-- custom js -->
    <script src="./script.js"></script>
  </body>
</html>
